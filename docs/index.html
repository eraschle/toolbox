<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolbox – Übersicht</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F5;
      --card: #FFFFFF;
      --card-hover: #F5FAFA;
      --border: #E8E4DF;
      --text: #1C1C1C;
      --muted: #7A7268;
      --accent: #008080;
      --accent-dark: #006666;
      --accent-tint: #E6F2F2;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    /* Dezenter „atmender" Hintergrund-Puls (einheitlich auf allen Seiten) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 55% at 50% 0%, var(--accent-tint) 0%, transparent 68%);
      opacity: 0.3;
      animation: breathe 7s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.22; transform: scaleY(1); }
      50%      { opacity: 0.40; transform: scaleY(1.05); }
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    header { margin-bottom: 32px; }
    h1 { font-family: var(--font-display); font-size: 2rem; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; color: var(--accent-dark); }
    .sub { color: var(--muted); margin: 0; font-size: 1rem; }
    .group { margin-top: 32px; }
    .group h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
    }
    a.card {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 18px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }
    a.card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .card .name { font-weight: 600; font-size: 1.05rem; }
    .card .meta { color: var(--muted); font-size: 0.85rem; }
    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
    }
    footer code {
      background: var(--card);
      padding: 2px 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .footer-credit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .footer-credit:hover { color: var(--accent); }
    .footer-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Toolbox</h1>
      <p class="sub">Übersicht der veröffentlichten Seiten.</p>
    </header>

    <section class="group">
      <h2>Seiten</h2>
      <div class="grid">
        <a class="card" href="skillsliste.html">
          <span class="name">Skillsliste</span>
          <span class="meta">Skills zur Krisenbewältigung</span>
        </a>
        <a class="card" href="budgetvorlage.html">
          <span class="name">Budgetvorlage</span>
          <span class="meta">Einnahmen &amp; Ausgaben erfassen</span>
        </a>
        <!-- Weitere Seite hinzufügen: Datei in docs/ ablegen und hier eine
             Karte ergänzen, z. B.:
        <a class="card" href="meine-seite.html">
          <span class="name">Titel</span>
          <span class="meta">Kurzbeschreibung</span>
        </a>
        -->
      </div>
    </section>

    <footer>
      <div>Gehostet via GitHub Pages unter <code>stayingclean.github.io/toolbox/</code></div>
      <a class="footer-credit" href="https://github.com/stayingclean" target="_blank" rel="noopener">
        <img class="footer-avatar" src="https://github.com/stayingclean.png?size=80" alt="stayingclean" loading="lazy" width="28" height="28">
        <span>Erstellt von stayingclean</span>
      </a>
    </footer>
  </div>
</body>
</html>
