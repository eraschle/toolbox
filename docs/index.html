<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skillssammlung – Übersicht</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --card-hover: #222630;
      --border: #2a2f3a;
      --text: #e6e8ec;
      --muted: #9aa3b2;
      --accent: #6ea8fe;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f7f9;
        --card: #ffffff;
        --card-hover: #f0f3f8;
        --border: #e2e6ec;
        --text: #1a1d24;
        --muted: #5b6472;
        --accent: #2563eb;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    header { margin-bottom: 32px; }
    h1 { font-size: 1.9rem; margin: 0 0 8px; letter-spacing: -0.02em; }
    .sub { color: var(--muted); margin: 0; font-size: 1rem; }
    .group { margin-top: 32px; }
    .group h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
    }
    a.card {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 18px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }
    a.card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .card .name { font-weight: 600; font-size: 1.05rem; }
    .card .meta { color: var(--muted); font-size: 0.85rem; }
    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
    }
    footer code {
      background: var(--card);
      padding: 2px 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Skillssammlung</h1>
      <p class="sub">Interaktive Übersicht der Skill-Listen für Claude und ChatGPT.</p>
    </header>

    <section class="group">
      <h2>Claude</h2>
      <div class="grid">
        <a class="card" href="Skillsliste.html">
          <span class="name">Skillsliste</span>
          <span class="meta">Interaktive Übersicht</span>
        </a>
      </div>
    </section>

    <footer>
      Gehostet via GitHub Pages unter <code>eraschle.github.io/skills/</code>
    </footer>
  </div>
</body>
</html>
