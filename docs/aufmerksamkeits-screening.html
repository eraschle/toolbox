<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aufmerksamkeits-Screening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #008080;
    --primary-dark: #006666;
    --primary-light: #e0f2f1;
    --primary-subtle: #f0faf9;
    --ink: #2d2d2d;
    --text-muted: #5a6b6a;
    --border: #cfe9e6;
    --bg: #ffffff;
    --danger: #b3441f;
    --danger-light: #fbe9e3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Source Sans 3', -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--primary-subtle);
    color: var(--ink);
    -webkit-text-size-adjust: 100%;
  }
  #app-shell {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 26px;
  }
  .card.center { text-align: center; }
  h1 {
    font-size: 24px;
    color: var(--primary-dark);
    margin: 0 0 12px;
  }
  h2 {
    font-size: 17px;
    color: var(--primary-dark);
    margin: 24px 0 8px;
  }
  p { line-height: 1.55; margin: 0 0 14px; }
  p.lead { font-size: 16px; color: var(--ink); }
  p.hint { font-size: 14px; color: var(--text-muted); }
  .row-meta { font-weight: 600; color: var(--primary-dark); margin: 0 0 4px; }

  .legend-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
  .legend-cell {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    width: 84px;
  }
  .legend-cell .symbol-svg { width: 44px; height: 44px; }
  .legend-badge {
    font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px;
    background: var(--primary-light); color: var(--primary); text-align: center;
  }
  .legend-badge.target { background: var(--primary); color: #fff; }

  .name-field {
    display: block; font-size: 14px; color: var(--text-muted);
    margin: 20px 0 18px;
  }
  .name-field input {
    display: block; width: 100%; margin-top: 6px;
    padding: 10px 12px; font-size: 15px; font-family: inherit;
    border: 1px solid var(--border); border-radius: 8px;
  }

  .btn {
    font-family: inherit; font-size: 15px; font-weight: 600;
    padding: 12px 22px; border-radius: 10px; border: none;
    cursor: pointer; transition: opacity 0.15s ease;
  }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-secondary { background: var(--primary-light); color: var(--primary-dark); }
  .btn-link {
    background: none; border: none; color: var(--text-muted);
    font-family: inherit; font-size: 13px; text-decoration: underline;
    cursor: pointer; padding: 4px;
  }
  .button-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }

  .row-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .timer-label { font-weight: 700; font-size: 20px; color: var(--primary-dark); margin: 0; }
  .timer-track {
    height: 8px; background: var(--primary-light); border-radius: 999px;
    overflow: hidden; margin-bottom: 22px;
  }
  .timer-fill {
    height: 100%; width: 100%; background: var(--primary);
    border-radius: 999px; transition: width 0.1s linear;
  }

  .symbol-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: flex-start; margin-bottom: 8px;
  }
  .symbol-cell {
    width: 48px; height: 48px; padding: 2px;
    border: none; background: transparent; border-radius: 50%;
    cursor: pointer; position: relative;
  }
  .symbol-cell .symbol-svg { width: 100%; height: 100%; display: block; }
  .symbol-cell.marked {
    background: var(--primary-light);
    box-shadow: 0 0 0 3px var(--primary);
  }
  div.symbol-cell { cursor: default; }

  .cancel-row { text-align: right; margin-top: 6px; }

  .stat-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    margin: 18px 0 22px;
  }
  .stat-card {
    background: var(--primary-subtle); border-radius: 10px;
    padding: 14px 12px; text-align: center;
  }
  .stat-value { display: block; font-size: 22px; font-weight: 700; color: var(--primary-dark); }
  .stat-label { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .results-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
  .results-table th, .results-table td {
    text-align: center; padding: 7px 4px; border-bottom: 1px solid var(--border);
  }
  .results-table th { color: var(--text-muted); font-weight: 600; }

  .callout {
    background: var(--primary-subtle); border-left: 3px solid var(--primary);
    border-radius: 0 8px 8px 0; padding: 14px 16px; font-size: 13.5px;
    color: var(--text-muted); margin-bottom: 8px;
  }
  .callout strong { color: var(--primary-dark); }

  .manual-copy-area {
    width: 100%; min-height: 140px; margin-top: 10px;
    font-family: 'Source Sans 3', monospace; font-size: 13px;
    padding: 10px; border: 1px solid var(--border); border-radius: 8px;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--primary-dark); color: #fff; padding: 10px 18px;
    border-radius: 999px; font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 720px) {
    .card { padding: 22px 18px; border-radius: 10px; }
    .symbol-cell { width: 42px; height: 42px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  }

  @media print {
    .symbol-cell, .button-row, .name-field, #app-shell .card:not(.print-keep) { box-shadow: none; }
    button { display: none; }
  }

  /* Urheber-Credit (Fusszeile) */
  .page-footer {
    text-align: center; margin-top: 28px; padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .footer-credit {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text-muted); text-decoration: none; font-size: 13px;
    transition: color 0.15s ease;
  }
  .footer-credit:hover { color: var(--primary-dark); }
  .footer-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); object-fit: cover; display: block;
  }
</style>
</head>
<body>
  <div id="app-shell">
    <div id="app"></div>
    <footer class="page-footer">
      <a class="footer-credit" href="https://github.com/stayingclean" target="_blank" rel="noopener">
        <img class="footer-avatar" src="https://github.com/stayingclean.png?size=80" alt="stayingclean" loading="lazy" width="28" height="28">
        <span>Erstellt von stayingclean</span>
      </a>
    </footer>
  </div>
  <div id="copy-toast" class="toast"></div>

<script>
(function () {
  "use strict";

  var CONFIG = {
    rows: 14,
    symbolsPerRow: 32,
    practiceSymbols: 16,
    secondsPerRow: 20,
    targetRatioMin: 0.35,
    targetRatioMax: 0.45,
    nearMissProbability: 0.5,
  };

  // ---------- symbol generation ----------

  function isTarget(symbol) {
    return symbol.baseForm === "filled" && (symbol.topMarks + symbol.bottomMarks) === 2;
  }

  function randomChoice(options) {
    return options[Math.floor(Math.random() * options.length)];
  }

  function makeTarget() {
    var split = randomChoice([[2, 0], [0, 2], [1, 1]]);
    return { baseForm: "filled", topMarks: split[0], bottomMarks: split[1] };
  }

  function makeNearMissDistractor() {
    var total = randomChoice([1, 3, 4]);
    var split;
    if (total === 1) split = randomChoice([[1, 0], [0, 1]]);
    else if (total === 3) split = randomChoice([[2, 1], [1, 2]]);
    else split = [2, 2];
    return { baseForm: "filled", topMarks: split[0], bottomMarks: split[1] };
  }

  function makeOutlineDistractor() {
    var total = Math.floor(Math.random() * 5);
    var options = [];
    for (var top = 0; top <= 2; top++) {
      var bottom = total - top;
      if (bottom >= 0 && bottom <= 2) options.push([top, bottom]);
    }
    var split = randomChoice(options);
    return { baseForm: "outline", topMarks: split[0], bottomMarks: split[1] };
  }

  function makeDistractor() {
    return Math.random() < CONFIG.nearMissProbability ? makeNearMissDistractor() : makeOutlineDistractor();
  }

  function shuffle(list) {
    for (var i = list.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = list[i]; list[i] = list[j]; list[j] = tmp;
    }
    return list;
  }

  function generateRow(symbolsPerRow) {
    var ratio = CONFIG.targetRatioMin + Math.random() * (CONFIG.targetRatioMax - CONFIG.targetRatioMin);
    var targetCount = Math.round(symbolsPerRow * ratio);
    var symbols = [];
    for (var i = 0; i < targetCount; i++) symbols.push(makeTarget());
    for (var j = 0; j < symbolsPerRow - targetCount; j++) symbols.push(makeDistractor());
    shuffle(symbols);
    symbols.forEach(function (symbol, index) {
      symbol.position = index;
      symbol.isTarget = isTarget(symbol);
    });
    return symbols;
  }

  function generateTest() {
    var testRows = [];
    for (var r = 0; r < CONFIG.rows; r++) testRows.push(generateRow(CONFIG.symbolsPerRow));
    return testRows;
  }

  function makeFixedSymbol(baseForm, topMarks, bottomMarks) {
    return { baseForm: baseForm, topMarks: topMarks, bottomMarks: bottomMarks };
  }

  // ---------- SVG rendering ----------

  function tickLines(topMarks, bottomMarks) {
    var segments = [];
    function zoneLines(count, centerAngle) {
      var angles = [];
      if (count === 1) angles = [centerAngle];
      if (count === 2) angles = [centerAngle - 27, centerAngle + 27];
      angles.forEach(function (angleDeg) {
        var angle = (angleDeg * Math.PI) / 180;
        var r1 = 16, len = 11;
        var x1 = 30 + r1 * Math.cos(angle);
        var y1 = 30 + r1 * Math.sin(angle);
        var x2 = 30 + (r1 + len) * Math.cos(angle);
        var y2 = 30 + (r1 + len) * Math.sin(angle);
        segments.push(
          '<line x1="' + x1.toFixed(1) + '" y1="' + y1.toFixed(1) + '" x2="' + x2.toFixed(1) +
          '" y2="' + y2.toFixed(1) + '" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>'
        );
      });
    }
    zoneLines(topMarks, -90);
    zoneLines(bottomMarks, 90);
    return segments.join("");
  }

  function symbolSVG(symbol) {
    var circle = symbol.baseForm === "filled"
      ? '<circle cx="30" cy="30" r="16" fill="var(--primary)"/>'
      : '<circle cx="30" cy="30" r="16" fill="var(--bg)" stroke="var(--primary)" stroke-width="3"/>';
    return '<svg viewBox="0 0 60 60" class="symbol-svg" aria-hidden="true">' + circle + tickLines(symbol.topMarks, symbol.bottomMarks) + '</svg>';
  }

  // ---------- scoring ----------

  function computeRowStats(rowSymbols, markedPositions) {
    var hits = 0, omissions = 0, commissions = 0, targetCount = 0;
    rowSymbols.forEach(function (symbol) {
      var marked = markedPositions.has(symbol.position);
      if (symbol.isTarget) {
        targetCount++;
        if (marked) hits++; else omissions++;
      } else if (marked) {
        commissions++;
      }
    });
    return { hits: hits, omissions: omissions, commissions: commissions, targetCount: targetCount };
  }

  function aggregateStats(statsByRow) {
    return statsByRow.reduce(function (acc, stat) {
      return {
        hits: acc.hits + stat.hits,
        omissions: acc.omissions + stat.omissions,
        commissions: acc.commissions + stat.commissions,
        targetTotal: acc.targetTotal + stat.targetCount,
      };
    }, { hits: 0, omissions: 0, commissions: 0, targetTotal: 0 });
  }

  // ---------- application state ----------

  var state = {
    phase: "intro",
    currentRowIndex: -1,
    practiceRow: null,
    practiceMarked: null,
    testRows: [],
    markedByRow: [],
    statsByRow: [],
    timerHandle: null,
    rowStartTime: null,
    patientName: "",
  };

  function resetApp() {
    if (state.timerHandle) clearInterval(state.timerHandle);
    state.phase = "intro";
    state.currentRowIndex = -1;
    state.practiceRow = generateRow(CONFIG.practiceSymbols);
    state.practiceMarked = new Set();
    state.testRows = generateTest();
    state.markedByRow = [];
    state.statsByRow = [];
    render();
  }

  // ---------- screen renderers ----------

  function renderSymbolGrid(rowSymbols, markedSet, interactive) {
    var cells = rowSymbols.map(function (symbol) {
      var marked = markedSet.has(symbol.position);
      var classes = "symbol-cell" + (marked ? " marked" : "");
      if (interactive) {
        return '<button class="' + classes + '" data-action="toggle-symbol" data-position="' + symbol.position +
          '" aria-pressed="' + marked + '" aria-label="Symbol ' + (symbol.position + 1) + '">' + symbolSVG(symbol) + '</button>';
      }
      return '<div class="' + classes + '" aria-hidden="true">' + symbolSVG(symbol) + '</div>';
    });
    return '<div class="symbol-grid">' + cells.join("") + '</div>';
  }

  function renderLegend() {
    var targets = [[2, 0], [0, 2], [1, 1]].map(function (s) { return makeFixedSymbol("filled", s[0], s[1]); });
    var distractors = [
      makeFixedSymbol("filled", 1, 0),
      makeFixedSymbol("filled", 2, 2),
      makeFixedSymbol("outline", 2, 0),
    ];
    var targetCells = targets.map(function (s) {
      return '<div class="legend-cell">' + symbolSVG(s) + '<span class="legend-badge target">Zielreiz</span></div>';
    }).join("");
    var distractorCells = distractors.map(function (s) {
      return '<div class="legend-cell">' + symbolSVG(s) + '<span class="legend-badge">Distraktor</span></div>';
    }).join("");
    return '<div class="legend-row">' + targetCells + '</div><div class="legend-row">' + distractorCells + '</div>';
  }

  function renderIntroScreen() {
    return (
      '<div class="card">' +
        '<h1>Aufmerksamkeits-Screening</h1>' +
        '<p class="lead">Ein selbstständig durchführbarer Konzentrationstest. Sie sehen nacheinander 14 Zeilen mit Symbolen. Markieren Sie pro Zeile alle Zielreize, bevor die Zeit abläuft – jede Zeile läuft automatisch ' + CONFIG.secondsPerRow + ' Sekunden.</p>' +
        '<h2>Zielregel</h2>' +
        '<p>Ein <strong>Zielreiz</strong> ist ein <strong>gefüllter Kreis mit genau zwei Strichen</strong> – egal ob beide oben, beide unten, oder je einer oben und unten.</p>' +
        renderLegend() +
        '<label class="name-field">Name (optional, nur für die Ergebnisanzeige)' +
          '<input type="text" id="patient-name-input" placeholder="Vor- und Nachname" />' +
        '</label>' +
        '<button class="btn btn-primary" data-action="start-practice">Mit Übungszeile beginnen</button>' +
      '</div>'
    );
  }

  function renderPracticeScreen() {
    return (
      '<div class="card">' +
        '<p class="row-meta">Übungszeile · ohne Zeitdruck</p>' +
        renderSymbolGrid(state.practiceRow, state.practiceMarked, true) +
        '<p class="hint">Klicken Sie alle Zielreize an, ein erneuter Klick hebt die Markierung wieder auf. Wenn Sie bereit sind, beginnt die eigentliche Testung.</p>' +
        '<button class="btn btn-primary" data-action="finish-practice">Testung starten</button>' +
      '</div>'
    );
  }

  function renderRowReadyScreen() {
    var rowNumber = state.currentRowIndex + 1;
    var isFirst = rowNumber === 1;
    return (
      '<div class="card center">' +
        '<p class="row-meta">Zeile ' + rowNumber + ' von ' + CONFIG.rows + '</p>' +
        '<p class="lead">' + (isFirst ? "Bereit für die erste Zeile?" : "Bereit für die nächste Zeile?") + ' Sie läuft automatisch ' + CONFIG.secondsPerRow + ' Sekunden.</p>' +
        '<button class="btn btn-primary" data-action="start-row">Start</button>' +
        '<div class="cancel-row"><button class="btn-link" data-action="cancel-test">Test abbrechen</button></div>' +
      '</div>'
    );
  }

  function renderRowActiveScreen() {
    var rowNumber = state.currentRowIndex + 1;
    var rowSymbols = state.testRows[state.currentRowIndex];
    var marked = state.markedByRow[state.currentRowIndex];
    return (
      '<div class="card">' +
        '<div class="row-header">' +
          '<p class="row-meta">Zeile ' + rowNumber + ' von ' + CONFIG.rows + '</p>' +
          '<p class="timer-label" id="timer-label">' + CONFIG.secondsPerRow + 's</p>' +
        '</div>' +
        '<div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>' +
        renderSymbolGrid(rowSymbols, marked, true) +
        '<div class="cancel-row"><button class="btn-link" data-action="cancel-test">Test abbrechen</button></div>' +
      '</div>'
    );
  }

  function buildResultsText(totals, balance) {
    var lines = [];
    lines.push("Aufmerksamkeits-Screening – digitale Durchführung");
    lines.push("Datum: " + new Date().toLocaleDateString("de-CH"));
    if (state.patientName) lines.push("Name: " + state.patientName);
    lines.push("");
    lines.push("Treffer gesamt: " + totals.hits + " von " + totals.targetTotal + " Zielreizen");
    lines.push("Auslassungsfehler: " + totals.omissions);
    lines.push("Verwechslungsfehler: " + totals.commissions);
    lines.push("Digitale Trefferbilanz (Treffer minus Fehler gesamt): " + balance);
    lines.push("");
    lines.push("Hinweis: unnormiertes Verfahren, deskriptive Rohwerte ohne Normbezug. Diese digitale Variante misst Genauigkeit innerhalb des Zeitfensters, nicht die fortlaufende Bearbeitungsgeschwindigkeit der papierbasierten Version.");
    return lines.join("\n");
  }

  function renderResultsScreen() {
    var totals = aggregateStats(state.statsByRow);
    var balance = totals.hits - totals.omissions - totals.commissions;
    var rowsHtml = state.statsByRow.map(function (stat, index) {
      return (
        "<tr><td>" + (index + 1) + "</td><td>" + stat.targetCount + "</td><td>" + stat.hits +
        "</td><td>" + stat.omissions + "</td><td>" + stat.commissions + "</td></tr>"
      );
    }).join("");

    return (
      '<div class="card">' +
        '<h1>Ergebnis</h1>' +
        (state.patientName ? '<p class="hint">' + escapeHtml(state.patientName) + " · " + new Date().toLocaleDateString("de-CH") + '</p>' : "") +
        '<div class="stat-grid">' +
          '<div class="stat-card"><span class="stat-value">' + totals.hits + ' / ' + totals.targetTotal + '</span><span class="stat-label">Treffer gesamt</span></div>' +
          '<div class="stat-card"><span class="stat-value">' + totals.omissions + '</span><span class="stat-label">Auslassungsfehler</span></div>' +
          '<div class="stat-card"><span class="stat-value">' + totals.commissions + '</span><span class="stat-label">Verwechslungsfehler</span></div>' +
          '<div class="stat-card"><span class="stat-value">' + balance + '</span><span class="stat-label">Digitale Trefferbilanz</span></div>' +
        '</div>' +
        '<table class="results-table">' +
          '<thead><tr><th>Zeile</th><th>Zielreize</th><th>Treffer</th><th>Ausl.</th><th>Verw.</th></tr></thead>' +
          '<tbody>' + rowsHtml + '</tbody>' +
        '</table>' +
        '<div class="callout"><strong>Zur Einordnung:</strong> Dieses Verfahren ist unnormiert – keine T-Werte oder Prozentränge. Da hier die ganze Zeile sichtbar ist und frei angeklickt werden kann, erfasst diese digitale Variante vor allem Genauigkeit innerhalb des Zeitfensters, nicht die fortlaufende Bearbeitungsgeschwindigkeit wie die stoppuhrgetaktete Papierversion.</div>' +
        '<div class="button-row">' +
          '<button class="btn btn-secondary" data-action="copy-results">Ergebnis kopieren</button>' +
          '<button class="btn btn-secondary" data-action="restart">Neuer Durchlauf</button>' +
        '</div>' +
        '<div id="manual-copy-container"></div>' +
      '</div>'
    );
  }

  function escapeHtml(text) {
    var div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function render() {
    var app = document.getElementById("app");
    if (state.phase === "intro") app.innerHTML = renderIntroScreen();
    else if (state.phase === "practice") app.innerHTML = renderPracticeScreen();
    else if (state.phase === "rowReady") app.innerHTML = renderRowReadyScreen();
    else if (state.phase === "rowActive") app.innerHTML = renderRowActiveScreen();
    else if (state.phase === "results") app.innerHTML = renderResultsScreen();
  }

  // ---------- timer ----------

  function beginRow() {
    state.markedByRow[state.currentRowIndex] = new Set();
    state.phase = "rowActive";
    render();
    state.rowStartTime = Date.now();
    state.timerHandle = setInterval(tickTimer, 100);
  }

  function tickTimer() {
    var elapsed = Date.now() - state.rowStartTime;
    var totalMs = CONFIG.secondsPerRow * 1000;
    var remainingMs = Math.max(0, totalMs - elapsed);
    var fillEl = document.getElementById("timer-fill");
    var labelEl = document.getElementById("timer-label");
    if (fillEl) fillEl.style.width = (100 * remainingMs / totalMs).toFixed(1) + "%";
    if (labelEl) labelEl.textContent = Math.ceil(remainingMs / 1000) + "s";
    if (remainingMs <= 0) {
      clearInterval(state.timerHandle);
      finishRow();
    }
  }

  function finishRow() {
    var rowSymbols = state.testRows[state.currentRowIndex];
    var marked = state.markedByRow[state.currentRowIndex];
    state.statsByRow[state.currentRowIndex] = computeRowStats(rowSymbols, marked);
    if (state.currentRowIndex + 1 < CONFIG.rows) {
      state.currentRowIndex += 1;
      state.phase = "rowReady";
    } else {
      state.phase = "results";
    }
    render();
  }

  // ---------- clipboard ----------

  function copyResults() {
    var totals = aggregateStats(state.statsByRow);
    var balance = totals.hits - totals.omissions - totals.commissions;
    var text = buildResultsText(totals, balance);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(showCopyToast).catch(function () { showManualCopyFallback(text); });
    } else {
      showManualCopyFallback(text);
    }
  }

  function showCopyToast() {
    var toast = document.getElementById("copy-toast");
    if (!toast) return;
    toast.textContent = "Ergebnis kopiert.";
    toast.classList.add("visible");
    setTimeout(function () { toast.classList.remove("visible"); }, 2000);
  }

  function showManualCopyFallback(text) {
    var container = document.getElementById("manual-copy-container");
    if (!container) return;
    container.innerHTML = '<p class="hint">Kopieren nicht automatisch möglich – Text bitte markieren und kopieren:</p><textarea readonly class="manual-copy-area"></textarea>';
    var textarea = container.querySelector("textarea");
    textarea.value = text;
    textarea.focus();
    textarea.select();
  }

  // ---------- event delegation ----------

  function toggleSymbol(button) {
    var position = parseInt(button.getAttribute("data-position"), 10);
    var markedSet = state.phase === "practice" ? state.practiceMarked : state.markedByRow[state.currentRowIndex];
    if (markedSet.has(position)) {
      markedSet.delete(position);
      button.classList.remove("marked");
      button.setAttribute("aria-pressed", "false");
    } else {
      markedSet.add(position);
      button.classList.add("marked");
      button.setAttribute("aria-pressed", "true");
    }
  }

  function handleAction(action, target) {
    if (action === "start-practice") {
      var nameInput = document.getElementById("patient-name-input");
      state.patientName = nameInput ? nameInput.value.trim() : "";
      state.phase = "practice";
      render();
    } else if (action === "finish-practice") {
      state.currentRowIndex = 0;
      state.phase = "rowReady";
      render();
    } else if (action === "start-row") {
      beginRow();
    } else if (action === "toggle-symbol") {
      toggleSymbol(target);
    } else if (action === "copy-results") {
      copyResults();
    } else if (action === "restart") {
      resetApp();
    } else if (action === "cancel-test") {
      if (window.confirm("Test wirklich abbrechen? Der bisherige Fortschritt geht verloren.")) {
        resetApp();
      }
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("app").addEventListener("click", function (event) {
      var actionEl = event.target.closest("[data-action]");
      if (!actionEl) return;
      handleAction(actionEl.getAttribute("data-action"), actionEl);
    });
    resetApp();
  });
})();
</script>
</body>
</html>
